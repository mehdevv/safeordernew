kind = "web"
previewPath = "/"
title = "Safe Order"
version = "1.0.0"
id = "artifacts/safeorder"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21948

[services.development]
run = "pnpm --filter @workspace/safeorder run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/safeorder", "run", "build" ]
publicDir = "artifacts/safeorder/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21948"
BASE_PATH = "/"
